  postgresql.wal.age:
    description: Age of the oldest WAL file.
    extended_documentation: |
      This metric requires WAL to be enabled with at least one replica.
    stability:
      level: development
    enabled: true
    unit: s
    gauge:
      value_type: int
  postgresql.wal.count:
    description: Number of WAL files.
    stability:
      level: development
    enabled: true
    unit: "1"
    gauge:
      value_type: int
  postgresql.wal.delay:
    attributes: [wal_operation_lag, replication_client]
    description: Time between flushing recent WAL locally and receiving notification that the standby server has completed an operation with it.
    stability:
      level: development
    enabled: false
    unit: s
    gauge:
      value_type: double
    extended_documentation: |
      This metric requires WAL to be enabled with at least one replica.
  postgresql.wal.lag:
    attributes: [wal_operation_lag, replication_client]
    description: Time between flushing recent WAL locally and receiving notification that the standby server has completed an operation with it.
    stability:
      level: development
    enabled: true
    unit: s
    gauge:
      value_type: int
    extended_documentation: |
      This metric requires WAL to be enabled with at least one replica.
