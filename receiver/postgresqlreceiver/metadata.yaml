type: postgresql
status:
  class: receiver
  stability:
    beta: [metrics]
    development: [logs]
  distributions: [contrib]
  codeowners:
    active: [antonblock, ishleenk17]
    seeking_new: true
    emeritus: [djaglowski]
resource_attributes:
  postgresql.database.name:
    description: The name of the database.
    enabled: true
    type: string
  postgresql.db.version:
    description: The version of postgresql databse
    enabled: true
    type: string
  postgresql.index.name:
    description: The name of the index on a table.
    enabled: true
    type: string
  postgresql.schema.name:
    description: The schema name.
    enabled: true
    type: string
  postgresql.table.name:
    description: The table name.
    enabled: true
    type: string
  service.instance.id:
    description: A unique identifier of the PostgreSQL instance in the format host:port (defaults to 'unknown:5432' in case of error in generating this value).
    enabled: true
    type: string

attributes:
  bg_buffer_source:
    description: The source of a buffer write.
    type: string
    enum:
      - backend
      - backend_fsync
      - checkpoints
      - bgwriter
    name_override: source
  bg_checkpoint_type:
    description: The type of checkpoint state.
    type: string
    enum:
      - requested
      - scheduled
    name_override: type
  bg_duration_type:
    description: The type of time spent during the checkpoint.
    type: string
    enum:
      - sync
      - write
    name_override: type
  cloud.provider:
    description: The cloud provider hosting PostgreSQL.
    type: string

  collection.collected_at:
    description: Unix timestamp in milliseconds when data was collected.
    type: int
  collection.column_count:
    description: Total number of columns across all collected tables.
    type: int
  collection.completion_ratio:
    description: Ratio of successfully collected tables to total tables.
    type: double
  collection.constraint_count:
    description: Total number of constraints across all collected tables.
    type: int
  collection.duration_ms:
    description: The duration of schema collection in milliseconds.
    type: int
  collection.error_count:
    description: Number of errors encountered during collection.
    type: int
  collection.errors:
    description: JSON-encoded list of errors encountered during collection.
    type: string
  collection.extension_count:
    description: The number of extensions installed.
    type: int
  collection.extensions:
    description: JSON-encoded list of installed extensions.
    type: string
  collection.has_errors:
    description: Whether any errors occurred during collection.
    type: bool
  collection.index_count:
    description: Total number of indexes across all collected tables.
    type: int
  collection.schema_version:
    description: Monotonically increasing version number for the schema snapshot.
    type: int
  collection.setting_count:
    description: The number of PostgreSQL settings collected.
    type: int
  collection.settings:
    description: JSON-encoded PostgreSQL settings collected.
    type: string
  collection.table_count:
    description: The total number of tables in the database.
    type: int
  collection.total_row_count:
    description: Sum of row counts (live_tuples) across all tables in the snapshot; estimate from pg_stat_user_tables or pg_class.reltuples.
    type: int
  collection.total_size_bytes:
    description: Total size of all collected tables in bytes.
    type: int
  collection.type:
    description: The type of schema collection performed.
    type: string
    enum: [full_snapshot, selective_refresh]
  db.namespace:
    description: The namespace or schema of the database where the query is executed.
    type: string
  db.oid:
    description: The OID of the database.
    type: int
  db.postgresql.version_num:
    description: The PostgreSQL version number (e.g. 150000 for 15.0).
    type: int
  db.postgresql.version_string:
    description: The PostgreSQL version string (e.g. "PostgreSQL 15.0").
    type: string
  db.query.comment:
    description: SQL comments extracted from the raw query before obfuscation.
    type: string
  db.query.tables:
    description: Comma-separated list of tables referenced in the query.
    type: string
  db.query.text:
    description: The text of the database query being executed.
    type: string
  db.system.name:
    description: The database management system (DBMS) product as identified by the client instrumentation.
    type: string
    enum: [postgresql]
  dbname:
    description: name of the database
    type: string
  event.type:
    description: The type of schema collection event.
    type: string
  function:
    description: The name of the function.
    type: string
  lock_type:
    description: Type of the lockable object.
    type: string
  mode:
    description: Name of the lock mode held or desired by the process.
    type: string
  network.peer.address:
    description: IP address of the client connected to this backend.
    type: string
  network.peer.port:
    description: TCP port number that the client is using for communication with this backend.
    type: int
  operation:
    description: The database operation.
    type: string
    enum: [ins, upd, del, hot_upd]
  postgresql.application_name:
    description: Name of the application that is connected to this backend.
    type: string
  postgresql.backend_type:
    description: Type of current backend. Possible types are autovacuum launcher, autovacuum worker, logical replication launcher, logical replication worker, parallel worker, background writer, client backend, checkpointer, startup, walreceiver, walsender, and walwriter.
    type: string
  postgresql.backend_xid:
    description: Top-level transaction identifier of this backend, if any.
    type: int
  postgresql.blk_read_time:
    description: Total time spent reading blocks by the statement, in milliseconds. Requires track_io_timing = on.
    type: double
  postgresql.blk_write_time:
    description: Total time spent writing blocks by the statement, in milliseconds. Requires track_io_timing = on.
    type: double
  postgresql.calls:
    description: Number of times the statement was executed, reported in delta value.
    type: int
  postgresql.client_hostname:
    description: Host name of the connected client, as reported by a reverse DNS lookup of client_addr.
    type: string
  postgresql.pid:
    description: Process ID of this backend.
    type: int
  postgresql.query_id:
    description: Identifier of this backend's most recent query. If state is active this field shows the identifier of the currently executing query. In all other states, it shows the identifier of last query that was executed.
    type: string
  postgresql.query_plan:
    description: The execution plan used by PostgreSQL for the query.
    type: string
  postgresql.query_start:
    description: Time when the currently active query was started, or if state is not active, when the last query was started.
    type: string
  postgresql.queryid:
    description: Hash code to identify identical normalized queries.
    type: string
  postgresql.rolname:
    description: The name of the PostgreSQL role that executed the query.
    type: string
  postgresql.rows:
    description: Total number of rows retrieved or affected by the statement, reported in delta value.
    type: int
  postgresql.shared_blks_dirtied:
    description: Total number of shared blocks dirtied by the statement, reported in delta value.
    type: int
  postgresql.shared_blks_hit:
    description: Total number of shared block cache hits by the statement, reported in delta value.
    type: int
  postgresql.shared_blks_read:
    description: Total number of shared blocks read by the statement, reported in delta value.
    type: int
  postgresql.shared_blks_written:
    description: Total number of shared blocks written by the statement, reported in delta value.
    type: int
  postgresql.state:
    description: Current overall state of this backend
    type: string
  postgresql.state_change:
    description: Time when the state was last changed.
    type: string
  postgresql.temp_blks_read:
    description: Total number of temp blocks read by the statement, reported in delta value.
    type: int
  postgresql.temp_blks_written:
    description: Total number of temp blocks written by the statement, reported in delta value.
    type: int
  postgresql.total_exec_time:
    description: Total time spent executing the statement, in delta milliseconds.
    type: double
  postgresql.total_plan_time:
    description: Total time spent planning the statement, in delta milliseconds.
    type: double
  postgresql.wait_event:
    description: Wait event name if backend is currently waiting, otherwise NULL.
    type: string
  postgresql.wait_event_type:
    description: The type of event for which the backend is waiting, if any; otherwise NULL.
    type: string
  postgresql.xact_start:
    description: Time when this process's current transaction was started, or null if no transaction is active. If the current query is the first of its transaction, this column is equal to the query_start column.
    type: string
  query_id:
    description: Hash code to identify identical normalized queries.
    type: string
  query_text:
    description: Text of a representative statement
    type: string
  relation:
    description: OID of the relation targeted by the lock, or null if the target is not a relation or part of a relation.
    type: string
  relation_name:
    description: name of the relation
    type: string
  replication_client:
    description: The IP address of the client connected to this backend. If this field is "unix", it indicates either that the client is connected via a Unix socket.
    type: string
  source:
    description: The block read source type.
    type: string
    enum:
      - heap_read
      - heap_hit
      - idx_read
      - idx_hit
      - toast_read
      - toast_hit
      - tidx_read
      - tidx_hit
  state:
    description: The tuple (row) state.
    type: string
    enum: [dead, live]
  table.column_count:
    description: Number of columns in the table.
    type: int
  table.columns:
    description: JSON-encoded column definitions for the table.
    type: string
  table.constraint_count:
    description: Number of constraints on the table.
    type: int
  table.constraints:
    description: JSON-encoded constraint definitions for the table.
    type: string
  table.dead_tuples:
    description: Estimated number of dead rows in the table.
    type: int
  table.description:
    description: Comment/description on the table.
    type: string
  table.has_oids:
    description: Whether the table has OIDs (PG10-11 only).
    type: bool
  table.index_count:
    description: Number of indexes on the table.
    type: int
  table.index_scans:
    description: Number of index scans on the table.
    type: int
  table.index_tup_fetch:
    description: Number of live rows fetched by index scans.
    type: int
  table.indexes:
    description: JSON-encoded index definitions for the table.
    type: string
  table.is_partitioned:
    description: Whether the table is partitioned.
    type: bool
  table.last_analyze:
    description: Timestamp of last manual analyze.
    type: string
  table.last_autoanalyze:
    description: Timestamp of last automatic analyze.
    type: string
  table.last_autovacuum:
    description: Timestamp of last automatic vacuum.
    type: string
  table.last_vacuum:
    description: Timestamp of last manual vacuum.
    type: string
  table.live_tuples:
    description: Estimated number of live rows in the table.
    type: int
  table.mod_since_analyze:
    description: Estimated number of rows modified since last analyze.
    type: int
  table.name:
    description: The name of the table.
    type: string
  table.oid:
    description: The OID of the table.
    type: int
  table.owner:
    description: The owner of the table.
    type: string
  table.parent_oid:
    description: OID of the parent table for partitioned tables.
    type: int
  table.partition_expr:
    description: Partition expression for partitioned tables.
    type: string
  table.schema_name:
    description: The schema name of the table.
    type: string
  table.seq_scans:
    description: Number of sequential scans on the table.
    type: int
  table.seq_tup_read:
    description: Number of live rows fetched by sequential scans.
    type: int
  table.size_bytes:
    description: The data size of the table in bytes (excluding indexes and TOAST).
    type: int
  table.tablespace:
    description: The tablespace OID of the table.
    type: int
  table.total_size_bytes:
    description: The total size of the table in bytes (including indexes and TOAST).
    type: int
  table.type:
    description: The relation kind (r=table, v=view, m=materialized view, p=partitioned).
    type: string
  table.view_definition:
    description: The view definition SQL for views and materialized views.
    type: string
  table.xmin:
    description: The xmin transaction ID for change tracking.
    type: int
  user.name:
    description: Name of the user logged into this backend.
    type: string
  wal_operation_lag:
    name_override: operation
    description: The operation which is responsible for the lag.
    type: string
    enum: [flush, replay, write]
events:
  db.server.extensions_collection:
    enabled: true
    description: PostgreSQL extensions collection event — one record per scrape, lists all installed extensions with version and schema.
    attributes:
      - db.system.name
      - db.namespace
      - db.oid
      - db.postgresql.version_num
      - db.postgresql.version_string
      - cloud.provider
      - event.type
      - collection.type
      - collection.schema_version
      - collection.extension_count
      - collection.extensions
      - collection.collected_at
  db.server.query_sample:
    enabled: true
    description: query sample
    attributes:
      - db.system.name
      - db.namespace
      - event.type
      - db.query.text
      - db.query.comment
      - db.query.tables
      - user.name
      - postgresql.state
      - postgresql.pid
      - postgresql.application_name
      - network.peer.address
      - network.peer.port
      - postgresql.client_hostname
      - postgresql.backend_type
      - postgresql.xact_start
      - postgresql.query_start
      - postgresql.state_change
      - postgresql.wait_event
      - postgresql.wait_event_type
      - postgresql.backend_xid
      - postgresql.query_id
      - postgresql.total_exec_time
  db.server.schema_collection:
    enabled: true
    description: PostgreSQL schema collection event with table, column, index, and constraint definitions
    attributes:
      - db.system.name
      - db.namespace
      - db.oid
      - db.postgresql.version_num
      - db.postgresql.version_string
      - cloud.provider
      - event.type
      - collection.type
      - collection.table_count
      - collection.total_row_count
      - collection.column_count
      - collection.index_count
      - collection.constraint_count
      - collection.extension_count
      - collection.total_size_bytes
      - collection.duration_ms
      - collection.has_errors
      - collection.error_count
      - collection.completion_ratio
      - collection.collected_at
      - collection.schema_version
      - collection.extensions
      - collection.settings
      - collection.setting_count
      - collection.errors
      - table.oid
      - table.schema_name
      - table.name
      - table.type
      - table.owner
      - table.xmin
      - table.tablespace
      - table.has_oids
      - table.description
      - table.live_tuples
      - table.dead_tuples
      - table.mod_since_analyze
      - table.seq_scans
      - table.seq_tup_read
      - table.index_scans
      - table.index_tup_fetch
      - table.size_bytes
      - table.total_size_bytes
      - table.last_vacuum
      - table.last_autovacuum
      - table.last_analyze
      - table.last_autoanalyze
      - table.view_definition
      - table.is_partitioned
      - table.parent_oid
      - table.partition_expr
      - table.column_count
      - table.index_count
      - table.constraint_count
      - table.columns
      - table.indexes
      - table.constraints
  db.server.settings_collection:
    enabled: true
    description: PostgreSQL settings collection event — one record per scrape, captures critical pg_settings values (connections, memory, WAL, replication).
    attributes:
      - db.system.name
      - db.namespace
      - db.oid
      - db.postgresql.version_num
      - db.postgresql.version_string
      - cloud.provider
      - event.type
      - collection.type
      - collection.schema_version
      - collection.setting_count
      - collection.settings
      - collection.collected_at
  db.server.top_query:
    enabled: true
    description: top query
    attributes:
      - db.system.name
      - db.namespace
      - event.type
      - db.query.text
      - db.query.comment
      - db.query.tables
      - user.name
      - postgresql.calls
      - postgresql.rows
      - postgresql.shared_blks_dirtied
      - postgresql.shared_blks_hit
      - postgresql.shared_blks_read
      - postgresql.shared_blks_written
      - postgresql.temp_blks_read
      - postgresql.temp_blks_written
      - postgresql.queryid
      - postgresql.rolname
      - postgresql.total_exec_time
      - postgresql.total_plan_time
      - postgresql.query_plan
      - postgresql.blk_read_time
      - postgresql.blk_write_time
metrics:
  postgresql.analyzed:
    description: Number of times a table has been manually analyzed.
    stability:
      level: development
    enabled: true
    unit: "{analyze}"
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
  postgresql.autoanalyzed:
    description: Number of times a table has been automatically analyzed.
    stability:
      level: development
    enabled: true
    unit: "{autoanalyze}"
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
  postgresql.autovacuumed:
    description: Number of times a table has been automatically vacuumed.
    stability:
      level: development
    enabled: true
    unit: "{autovacuum}"
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
  postgresql.backends:
    enabled: true
    description: The number of backends.
    stability:
      level: development
    unit: "1"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
  postgresql.bgwriter.buffers.allocated:
    description: Number of buffers allocated.
    stability:
      level: development
    enabled: true
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
    unit: "{buffers}"
  postgresql.bgwriter.buffers.writes:
    attributes:
      - bg_buffer_source
    description: Number of buffers written.
    stability:
      level: development
    enabled: true
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
    unit: "{buffers}"
  postgresql.bgwriter.checkpoint.count:
    attributes:
      - bg_checkpoint_type
    description: The number of checkpoints performed.
    stability:
      level: development
    enabled: true
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
    unit: "{checkpoints}"
  postgresql.bgwriter.duration:
    attributes:
      - bg_duration_type
    description: Total time spent writing and syncing files to disk by checkpoints.
    stability:
      level: development
    enabled: true
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: double
    unit: ms
  postgresql.bgwriter.maxwritten:
    description: Number of times the background writer stopped a cleaning scan because it had written too many buffers.
    stability:
      level: development
    enabled: true
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
    unit: "1"
  postgresql.blk_read_time:
    enabled: false
    description: Time spent reading data file blocks by backends in this database, in milliseconds (if track_io_timing is enabled, otherwise zero)
    stability:
      level: development
    unit: "ms"
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
  postgresql.blk_write_time:
    enabled: false
    description: Time spent writing data file blocks by backends in this database, in milliseconds (if track_io_timing is enabled, otherwise zero)
    stability:
      level: development
    unit: "ms"
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
  postgresql.blks_hit:
    enabled: false
    description: Number of times disk blocks were found already in the buffer cache.
    stability:
      level: development
    unit: "{blks_hit}"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
  postgresql.blks_read:
    enabled: false
    description: Number of disk blocks read in this database.
    stability:
      level: development
    unit: "{blks_read}"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
  postgresql.blocks_read:
    enabled: true
    description: The number of blocks read.
    stability:
      level: development
    unit: "1"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [source]
  postgresql.buffer_hit:
    stability:
      level: development
    attributes:
      - dbname
    enabled: true
    description: The number of disk block hits in the buffer cache, thereby avoiding database reads, tagged with database name.
    unit: "{hit}/s"
    gauge:
      value_type: int
  postgresql.commits:
    enabled: true
    description: The number of commits.
    stability:
      level: development
    unit: "1"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
  postgresql.connection.count:
    enabled: true
    description: The number of active connections to this database. If DBM is enabled, this metric is tagged with state, app, db and user
    unit: "{connection}"
    stability:
      level: development
    gauge:
      value_type: int
    attributes: [postgresql.state, postgresql.application_name, user.name]
  postgresql.connection.max:
    enabled: true
    description: Configured maximum number of client connections allowed
    unit: "{connection}"
    stability:
      level: development
    gauge:
      value_type: int
  postgresql.database.count:
    description: Number of user databases.
    stability:
      level: development
    enabled: true
    sum:
      aggregation_temporality: cumulative
      monotonic: false
      value_type: int
    unit: "{databases}"
  postgresql.database.locks:
    enabled: false
    description: The number of database locks.
    stability:
      level: development
    unit: "{lock}"
    gauge:
      value_type: int
    attributes: [relation, mode, lock_type]
  postgresql.db_size:
    enabled: true
    description: The database disk usage.
    stability:
      level: development
    unit: By
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
  postgresql.deadlocks:
    enabled: false
    description: The number of deadlocks.
    stability:
      level: development
    unit: "{deadlock}"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
  postgresql.function.calls:
    enabled: false
    description: The number of calls made to a function. Requires `track_functions=pl|all` in Postgres config.
    stability:
      level: development
    unit: "{call}"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [function]
  postgresql.index.blocks_read:
    description: The number of disk blocks read by this index.
    stability:
      level: development
    enabled: true
    unit: "1"
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
    attributes: [source]
  postgresql.index.rows_read:
    description: The number of index entries returned by scans on this index.
    stability:
      level: development
    enabled: true
    unit: "{rows}"
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
  postgresql.index.scans:
    description: The number of index scans on a table.
    stability:
      level: development
    enabled: true
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
    unit: "{scans}"
  postgresql.index.size:
    description: The size of the index on disk.
    stability:
      level: development
    enabled: true
    gauge:
      value_type: int
    unit: "By"
  postgresql.index_bloat:
    description: Estimated index bloat ratio (actual pages / expected pages).
    extended_documentation: |
      A value of 1.0 indicates no bloat, higher values indicate wasted space.
      Based on pg_stats and pg_class estimates.
    stability:
      level: development
    enabled: true
    unit: "1"
    gauge:
      value_type: double
  postgresql.live_rows:
    stability:
      level: development
    attributes:
      - relation_name
    enabled: true
    description: The approximate number of live rows, tagged with relation name.
    unit: "{row}"
    gauge:
      value_type: int
  postgresql.operations:
    enabled: true
    description: The number of db row operations.
    stability:
      level: development
    unit: "1"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [operation]
  postgresql.query.count:
    enabled: true
    description: Number of times the statement was executed.
    unit: "1"
    stability:
      level: development
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [query_text, query_id]
  #DBM METRICS:
  postgresql.query.total_exec_time:
    enabled: true
    description: Total wait time of the normalised timed events in nanaoseconds.
    unit: ns
    stability:
      level: development
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [query_text, query_id]
  postgresql.replication.data_delay:
    attributes: [replication_client]
    description: The amount of data delayed in replication.
    stability:
      level: development
    enabled: true
    gauge:
      value_type: int
    unit: By
  postgresql.rollbacks:
    enabled: true
    description: The number of rollbacks.
    stability:
      level: development
    unit: "1"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
  postgresql.rows:
    enabled: true
