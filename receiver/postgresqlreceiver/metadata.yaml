    gauge:
      value_type: int
  postgresql.rows_updated:
    stability:
      level: development
    attributes:
      - relation_name
    enabled: true
    description: Rows updated by queries in the db, tagged with relation name.
    unit: "{row}/s"
    gauge:
      value_type: int
  postgresql.sequential_scans:
    enabled: false
    description: The number of sequential scans.
    stability:
      level: development
    unit: "{sequential_scan}"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
  postgresql.table.count:
    description: Number of user tables in a database.
    stability:
      level: development
    enabled: true
    sum:
      aggregation_temporality: cumulative
      monotonic: false
      value_type: int
    unit: "{table}"
  postgresql.table.size:
    description: Disk space used by a table.
