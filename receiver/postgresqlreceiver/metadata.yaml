    stability:
      level: development
    unit: "1"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [state]
  postgresql.rows_deleted:
    stability:
      level: development
    attributes:
      - relation_name
    enabled: true
    description: Rows deleted by queries in this db, tagged with relation name.
    unit: "{row}/s"
    gauge:
      value_type: int
  postgresql.rows_fetched:
    stability:
      level: development
    attributes:
      - relation_name
    enabled: true
    description: Rows fetched by queries in this db, tagged with relation name.
